<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <style>
            body {
                text-align: center;
            }
            form {
                display: inline-block;
                width: 400px;
            }
            p {
                text-align: left;
            }
            label {
                display: block;
            }
        </style>
    </head>

    <body>
        <form>
            <h1>Login</h1>
            <p><label>Email:</label><br><input type="email" placeholder="Enter your Email"></p>
            <p><label>Password:</label><br><input type="password" placeholder="Enter your Password"></p>
            <p><input type="checkbox"> Remember me</p>
            <button type="button">LOGIN</button>
            <p>Doesn't have an account? <a href="Registration.html">Create new account</a></p>
        </form>
    </body>
</html>
