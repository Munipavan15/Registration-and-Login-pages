<!DOCTYPE html>
<html>
<head>
    <title>Registration page</title>
    <style>
        body {
            text-align: center;
        }
        form {
            display: inline-block;
            width: 400px;
        }
        p {
            text-align: left;
        }
        label {
            display: block;
        }
        input {
            width: 100%;
        }
    </style>
</head>
<body>
    <form>
        <h1>Company Registration Page</h1>
        <h2>Create your account</h2>
        <p><label>First name:</label><br><input type="text"></p>
        <p><label>Last name:</label><br><input type="text"></p>
        <p><label>Company name:</label><br><input type="text"></p>    
        <p><label>Phone number:</label><br><input type="tel"></p>
        <p><label>Email address:</label><br><input type="email"></p>
        <p><label>Password:</label><br><input type="password" placeholder="Must be 8 characters"></p>
        <p><label>Confirm Password:</label><br><input type="password" placeholder="Re-Enter Password"></p>
        <button type="button">Create Account</button>
        <p>Already have an account? <a href="Login.html">Login here</a></p>
    </form>

</body>
</html>
